<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asesoría Sommelier | Chocolates Ancestrales</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --cocoa: #4e342e;
            --taupe: #a1887f;
            --cream: #f9f7f2;
            --gold: #c5a059;
            --silk: rgba(249, 247, 242, 0.98);
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--cream);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            font-family: 'Montserrat', sans-serif;
            color: var(--cocoa);
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            border-bottom: 1px solid rgba(78, 52, 46, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            width: 240px;
            transition: var(--transition-smooth);
        }

        /* Menú Desktop (Visible por defecto) */
        .nav-menu-wrapper {
            display: flex;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: var(--cocoa);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* Hamburguesa (Solo móvil) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 18px;
            cursor: pointer;
            z-index: 1300;
            border: none;
            background: none;
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: var(--cocoa);
            transition: var(--transition-smooth);
            transform-origin: left center;
        }

        /* --- CHAT CONTAINER --- */
        .chat-container {
            flex-grow: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow: hidden;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .chat-header h1 {
            font-family: 'Cinzel';
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .message {
            max-width: 90%;
            font-size: 0.95rem;
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.6;
        }

        .sommelier-msg {
            align-self: flex-start;
            background: white;
            border-left: 2px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--cocoa);
            color: var(--cream);
        }

        .chat-input-area {
            padding: 30px 0;
            background: transparent;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            background: white;
            padding: 5px;
            border: 1px solid rgba(78, 52, 46, 0.1);
            border-radius: 4px;
        }

        input {
            flex-grow: 1;
            border: none;
            padding: 15px 20px;
            font-family: 'Montserrat';
            font-size: 1rem;
            outline: none;
        }

        .btn-send {
            background: var(--cocoa);
            color: white;
            border: none;
            padding: 0 30px;
            font-family: 'Cinzel';
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: var(--gold);
        }

        /* --- MÓVIL (Menos de 768px) --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-logo {
                width: 180px !important;
            }

            /* El menú se vuelve cortina */
            .nav-menu-wrapper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: var(--silk);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                opacity: 0;
                pointer-events: none;
                transition: var(--transition-smooth);
            }

            .nav-menu-wrapper.active {
                opacity: 1;
                pointer-events: auto;
            }

            nav ul {
                flex-direction: column;
                gap: 35px;
                align-items: center;
            }

            nav a {
                font-size: 1.2rem;
            }

            .menu-toggle.active span:nth-child(1) {
                transform: rotate(45deg) translate(2px, -2px);
            }

            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active span:nth-child(3) {
                transform: rotate(-45deg) translate(1px, 1px);
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo-container">
            <img src="logo.png" alt="Ancestrales" class="nav-logo">
        </div>
        <button class="menu-toggle" id="menu-toggle">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-menu-wrapper" id="nav-menu-wrapper">
            <ul>
                <li><a href="tienda.html">Regresar a la Tienda</a></li>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="bienestar2.html">Bienestar</a></li>
            </ul>
        </div>
    </nav>

    <main class="chat-container">
        <header class="chat-header">
            <h1>El Sommelier</h1>
            <p style="font-family: 'Playfair Display'; font-style: italic; color: var(--taupe);">Asesoría personalizada
            </p>
        </header>

        <div id="chat-messages">
            <div class="message sommelier-msg">Bienvenido. ¿En qué puedo asistirle hoy respecto a nuestro catálogo?
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Escriba su consulta..." onkeypress="handleKey(event)">
                <button class="btn-send" onclick="sendMessage()">Consultar</button>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://ancestrales-1.onrender.com";
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu-wrapper');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
            document.body.style.overflowY = navMenu.classList.contains('active') ? 'hidden' : 'auto';
        });

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            appendMessage(text, 'user-msg');
            input.value = '';

            const loading = appendMessage('<em>Analizando...</em>', 'sommelier-msg');
            try {
                const res = await fetch(`${API_BASE_URL}/sommelier`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text })
                });
                const data = await res.json();
                loading.remove();
                if (data.respuesta) {
                    const formatted = data.respuesta.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    appendMessage(formatted, 'sommelier-msg');
                }
            } catch (e) { loading.innerHTML = "Error de conexión."; }
        }

        function appendMessage(content, className) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
    </script>
</body>

</html>
