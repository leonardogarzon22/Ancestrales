<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bienestar Ancestral | Chocolates Ancestrales</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;300;500&family=Playfair+Display:ital,wght@0,400;1,600&display=swap"
        rel="stylesheet">

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --cocoa: #4e342e;
            --taupe: #a1887f;
            --cream: #f9f7f2;
            --gold: #c5a059;
            --silk: rgba(249, 247, 242, 0.98);
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--cream);
            color: var(--cocoa);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            border-bottom: 1px solid rgba(78, 52, 46, 0.1);
            transition: var(--transition-smooth);
        }

        .nav-logo {
            width: 240px;
            transition: var(--transition-smooth);
        }

        /* Menú Desktop */
        .nav-menu-wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: var(--cocoa);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* Hamburguesa */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 18px;
            cursor: pointer;
            z-index: 1100;
            border: none;
            background: none;
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: var(--cocoa);
            transition: var(--transition-smooth);
            transform-origin: left center;
        }

        /* --- CABECERA --- */
        .header-section {
            padding: 140px 5% 60px;
            text-align: center;
        }

        .header-section h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        .header-section p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: var(--taupe);
        }

        /* --- GRID DE VIDEOS --- */
        .video-grid {
            max-width: 1200px;
            margin: auto;
            padding: 40px 5% 120px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 80px 40px;
            justify-items: center;
        }

        .video-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .visual-container {
            position: relative;
            width: 300px;
            height: 420px;
        }

        .video-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            margin-top: 25px;
            text-align: center;
        }

        .video-info h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        /* --- RESPONSIVIDAD (MÓVIL) --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-menu-wrapper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: var(--silk);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                opacity: 0;
                pointer-events: none;
                transition: var(--transition-smooth);
            }

            .nav-menu-wrapper.active {
                opacity: 1;
                pointer-events: auto;
            }

            nav ul {
                flex-direction: column;
                gap: 30px;
            }

            nav a {
                font-size: 1.2rem;
            }

            .menu-toggle.active span:nth-child(1) {
                transform: rotate(45deg) translate(2px, -2px);
            }

            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active span:nth-child(3) {
                transform: rotate(-45deg) translate(1px, 1px);
            }

            .header-section h1 {
                font-size: 2rem;
                letter-spacing: 5px;
            }

            .visual-container {
                width: 280px;
                height: 390px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <img src="logo.png" alt="Ancestrales" class="nav-logo">
        <button class="menu-toggle" id="menu-toggle">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-menu-wrapper" id="nav-menu-wrapper">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <li><a href="bienestar2.html" style="color: var(--gold);">Bienestar</a></li>
            </ul>
        </div>
    </nav>

    <header class="header-section">
        <h1>BIENESTAR ANCESTRAL</h1>
        <p>Rituales, consejos y sabiduría del cacao.</p>
    </header>

    <main class="video-grid" id="ritual-container">
        <p style="text-align: center; grid-column: 1/-1;">Cargando sabiduría ancestral...</p>
    </main>

    <footer
        style="padding: 40px; text-align: center; background: #1a1a1a; color: white; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 4px;">
        © 2026 CHOCOLATES ANCESTRALES
    </footer>

    <script>
        // Configuración Firebase (Mantenida)
        const firebaseConfig = { apiKey: "TU_API_KEY", authDomain: "TU_PROYECTO.firebaseapp.com", databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com", projectId: "TU_PROYECTO", storageBucket: "TU_PROYECTO.appspot.com", messagingSenderId: "ID", appId: "APP_ID" };
        firebase.initializeApp(firebaseConfig);
        const ritualContainer = document.getElementById('ritual-container');

        firebase.database().ref('videos_tiktok').on('value', (snapshot) => {
            ritualContainer.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const article = document.createElement('article');
                article.className = 'video-card';
                article.innerHTML = `
                    <div class="visual-container">
                        <div class="video-wrapper">
                            <iframe src="https://www.tiktok.com/embed/v2/${data.tiktokID}" allow="autoplay; encrypted-media" scrolling="no"></iframe>
                        </div>
                    </div>
                    <div class="video-info">
                        <h3>${data.titulo}</h3>
                        <p style="color: var(--taupe); font-size: 0.85rem;">${data.descripcion}</p>
                    </div>
                `;
                ritualContainer.appendChild(article);
            });
        });

        // Menú Hamburguesa
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu-wrapper');
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
            document.body.style.overflowY = navMenu.classList.contains('active') ? 'hidden' : 'auto';
        });
    </script>
</body>

</html>
